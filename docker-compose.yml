# Primär für LOKALES Testen gedacht: `docker compose up --build` → localhost:3000.
# Auf Dokploy lieber den "Application"-Typ mit der Dockerfile nutzen (Dokploy
# übernimmt dann Routing, HTTPS, Env & Health-Check automatisch — kein Host-Port-
# Mapping / keine Traefik-Labels nötig).
services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Set in Dokploy's environment settings (or a local .env file):
      USESEND_API_KEY: ${USESEND_API_KEY}
      USESEND_BASE_URL: ${USESEND_BASE_URL:-https://app.usesend.com}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-connor@cwcodes.de}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-connor@cwcodes.de}
      CONTACT_FROM_NAME: ${CONTACT_FROM_NAME:-CWCODES}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
